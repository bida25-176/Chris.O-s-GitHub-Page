        <main class="container my-5">
             <h2>We are Dedicated to Providing Our Best Services to YOU!</h2>
            <!-- Service Selection -->
        <h3>Select Service</h3>

        <input type="radio" id="basic" name="service" value="basic" required>
        <label for="basic"><h4>Full Wash</h4></label><br>

        <input type="radio" id="standard" name="service" value="standard">
        <label for="standard"><h4>Interior Wash Only</h4></label><br>

        <input type="radio" id="premium" name="service" value="premium">
        <label for="premium"><h4>Premium Wash</h4></label><br><br>

          <!-- Expandable Add-ons -->
        <details>
            <summary><strong><h3>Add-ons (Click to expand)</h3></strong></summary>
            <br>

            <input type="checkbox" id="paint" name="addons[]" value="paint correction">
            <label for="paint">Paint Correction</label><br>

            <input type="checkbox" id="engine" name="addons[]" value="engine wash">
            <label for="engine">Engine Wash</label><br>

            <input type="checkbox" id="tint" name="addons[]" value="window tinting">
            <label for="tint">Window Tinting</label><br>

            <input type="checkbox" id="oil" name="addons[]" value="oil changing">
            <label for="oil">Oil Changing</label><br><br>
        </details>

        <br>
          <!-- Submit -->
        <input type="submit" value="Book Now">

        <img src="carwash services1.JPG.jpg" alt="Car Wash Services Image" class="img-fluid my-4">
        <img src="carwash services2.JPG.jpg" alt="Car Wash Services Image" class="img-fluid my-4">
